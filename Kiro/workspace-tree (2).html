<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiro Workspace 構成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#111418;
    color:#d4dbe8;
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    padding:40px 44px;
  }

  /* ── Header ── */
  .header {
    margin-bottom:32px;
    padding-left:14px;
    border-left:3px solid #86bc25;
  }
  .header h1 {
    font-family:'JetBrains Mono',monospace;
    font-size:16px; font-weight:700;
    color:#86bc25; letter-spacing:0.05em;
  }
  .header p { font-size:11px; color:#5a6a80; margin-top:5px; }

  /* ── Tree ── */
  .tree { font-family:'JetBrains Mono',monospace; font-size:12.5px; }

  .row {
    display:flex; align-items:baseline;
    padding:4px 8px; border-radius:5px;
    transition:background 0.1s;
  }
  .row:hover { background:#1a2030; }

  /* tree prefix lines — bright enough to see clearly */
  .prefix {
    color:#5a7a96;
    white-space:pre;
    flex-shrink:0;
    user-select:none;
  }

  .name { white-space:nowrap; flex-shrink:0; }

  /* ── Scope badge ── */
  .sc {
    display:inline-block;
    font-size:8px; font-weight:700;
    padding:1px 5px; border-radius:3px;
    margin-left:6px;
    font-family:'JetBrains Mono',monospace;
    vertical-align:middle; position:relative; top:-1px;
    letter-spacing:0.03em;
  }
  .sc-csp { background:#182e10; color:#a3d977; border:1px solid #2d5a1a; }
  .sc-aws { background:#0f1f3d; color:#7ab8f5; border:1px solid #1a3a70; }

  /* ── Status badge ── */
  .st {
    display:inline-block;
    font-size:7.5px; font-weight:700;
    padding:1px 4px; border-radius:3px;
    margin-left:4px;
    font-family:'JetBrains Mono',monospace;
    vertical-align:middle; position:relative; top:-1px;
  }
  .st-done { background:#0a3020; color:#5ddf9a; border:1px solid #1a5a36; }
  .st-wip  { background:#0f1f3d; color:#7ab8f5; border:1px solid #1a3a70; }
  .st-auto { background:#20103a; color:#c490f5; border:1px solid #4a1e8a; }
  .st-tbd  { background:#1e1c18; color:#7a7060; border:1px solid #3a3528; }

  /* ── Dotted line separator ── */
  .dots {
    flex:1;
    border-bottom:1px dotted #3a5570;
    margin:0 12px;
    position:relative; top:-3px;
    min-width:20px;
  }

  /* ── Comment ── */
  .cm {
    white-space:nowrap; flex-shrink:0;
    font-size:11px;
    font-family:'Noto Sans JP',sans-serif;
    font-weight:300;
  }
  .cm-g { color:#5ddf9a; }
  .cm-b { color:#7ab8f5; }
  .cm-p { color:#c490f5; }
  .cm-n { color:#5a6a80; }
  .cm-d { color:#4a5a6e; }

  /* ── File/folder name colors ── */
  .c-root { color:#eef2f8; font-weight:700; }
  .c-kiro { color:#86bc25; font-weight:700; }
  .c-dir  { color:#68c5f0; }
  .c-md   { color:#b8a0f8; }
  .c-xl   { color:#4ddba8; }
  .c-gen  { color:#a3d977; }
  .c-repo { color:#f5a050; }
  .c-dim  { color:#3a4a5a; }

  /* ── Legend ── */
  .legend {
    margin-top:28px; padding-top:18px;
    border-top:1px solid #1e2a38;
    display:flex; gap:8px 24px; flex-wrap:wrap; align-items:center;
  }
  .li {
    display:flex; align-items:center; gap:7px;
    font-size:10.5px; color:#5a6a80;
    font-family:'JetBrains Mono',monospace;
  }
  .ld { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
  .sep { width:1px; height:16px; background:#1e2a38; margin:0 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>Kiro Workspace 構成</h1>
  <p>検証フェーズ（AWS）</p>
</div>

<div class="tree" id="tree"></div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#a3d977"></div>CSP共通</div>
  <div class="li"><div class="ld" style="background:#7ab8f5"></div>検証フェーズ（AWS）</div>
  <div class="sep"></div>
  <div class="li"><div class="ld" style="background:#5ddf9a"></div>DONE　用意済み</div>
  <div class="li"><div class="ld" style="background:#7ab8f5"></div>WIP　作成中</div>
  <div class="li"><div class="ld" style="background:#c490f5"></div>AUTO　Kiro自動生成</div>
  <div class="li"><div class="ld" style="background:#7a7060"></div>TBD　検討中</div>
</div>

<script>
// [prefix, name, nameClass, scope('csp'|'aws'|''), status('done'|'wip'|'auto'|'tbd'|''), comment, commentClass]
const rows = [
  ['',                     'workspace/',                'c-root','',   '',     'ローカルワークスペースルート',                  'cm-n'],
  ['├── ',                '.kiro/',                    'c-kiro','',   '',     'Kiro 設定ディレクトリ',                        'cm-n'],

  ['│   ├── ',            'steering/',                 'c-dir', '',   '',     '全フェーズ自動適用ルール群',                    'cm-n'],
  ['│   │   ├── ',        'coding-standards.md',       'c-md',  'csp','done', '命名・コメント・コミット・fmt 規約',            'cm-g'],
  ['│   │   ├── ',        'terraform-rules.md',        'c-md',  'csp','done', 'ディレクトリ構成・バージョン制約（CSP別含む）', 'cm-g'],
  ['│   │   ├── ',        'spec-structure-rules.md',   'c-md',  'csp','done', 'Spec フォルダ命名・フェーズ・生成ルール',       'cm-g'],
  ['│   │   └── ',        'workflow.md',               'c-md',  'csp','done', '作業フロー・インプット参照先・出力先定義',      'cm-g'],

  ['│   ├── ',            'specs/',                    'c-dir', '',   '',     'Kiro 自動生成・人間が承認',                    'cm-n'],
  ['│   │   └── ',        'aws/',                      'c-dir', 'aws','',     '',                                             ''],
  ['│   │       └── ',    'cms-kiro-test/',             'c-dir', 'aws','',     'inputs 配下と同名',                           'cm-d'],
  ['│   │           ├── ','requirements.md',            'c-gen', 'aws','auto', 'ユーザーストーリー・機能要件・受け入れ基準',   'cm-p'],
  ['│   │           ├── ','design.md',                  'c-gen', 'aws','auto', 'アーキテクチャ・コンポーネント設計（MD形式）', 'cm-p'],
  ['│   │           └── ','tasks.md',                   'c-gen', 'aws','auto', '実装タスクリスト（チェックボックス形式）',     'cm-p'],

  ['│   └── ',            'skills/',                   'c-dir', '',   '',     'オンデマンド呼び出しスキル群',                 'cm-n'],
  ['│       ├── ',        'terraform-code/',           'c-dir', '',   '',     'Terraform コード生成スキル',                   'cm-n'],
  ['│       │   ├── ',    'terraform.md',              'c-md',  'aws','done', 'モジュール構成・相対パス・呼び出し7パターン',  'cm-g'],
  ['│       │   └── ',    'references/',               'c-dir', '',   '',     '',                                             ''],
  ['│       │       └── ','aws-module-catalog.md',     'c-md',  'aws','done', 'モジュール一覧・依存関係・入出力定義',         'cm-g'],
  ['│       └── ',        'design-doc/',               'c-dir', '',   '',     '設計書生成スキル',                             'cm-n'],
  ['│           └── ',    'design-doc.md',             'c-md',  'csp','wip',  'Excel 参照・MD 出力手順・要確認マークルール',  'cm-b'],

  ['├── ',                'src/',                      'c-dir', '',   '',     'Kiro が生成する Terraform コード一式',         'cm-n'],
  ['│   └── ',            'aws/',                      'c-dir', 'aws','',     '',                                             ''],
  ['│       └── ',        'cms-kiro-test/',             'c-dir', 'aws','auto', 'specs・inputs 配下と同名',                     'cm-p'],
  ['│           ├── ',    'main.tf',                   'c-gen', 'aws','auto', 'モジュール呼び出し・リソース定義',             'cm-p'],
  ['│           ├── ',    'variables.tf',              'c-gen', 'aws','auto', '入力変数（description・type 必須）',           'cm-p'],
  ['│           ├── ',    'outputs.tf',                'c-gen', 'aws','auto', '出力値定義',                                  'cm-p'],
  ['│           ├── ',    'version.tf',                'c-gen', 'aws','auto', 'Terraform・Provider バージョン制約',           'cm-p'],
  ['│           └── ',    'provider.tf',               'c-gen', 'aws','auto', 'Provider 設定',                               'cm-p'],

  ['├── ',                'Eng-repos/',                'c-repo','',   '',     'チームリポジトリ clone 先',                    'cm-n'],
  ['│   └── ',            'AWSRepos/',                 'c-repo','aws','tbd',  'Skills 経由で git clone・最新化（検討中）',    'cm-d'],
  ['│       └── ',        '[既存 Terraform モジュール群]','c-dim','aws','',   '相対パスで参照・直接変更禁止',                 'cm-d'],

  ['└── ',                'inputs/',                   'c-dir', '',   '',     '案件インプット置き場（CSP 別）',               'cm-n'],
  ['    └── ',            'aws/',                      'c-dir', 'aws','',     '',                                             ''],
  ['        └── ',        'cms-kiro-test/',             'c-dir', 'aws','',     'specs・src 配下と同名',                       'cm-d'],
  ['            ├── ',    'QA.xlsx',                   'c-xl',  'aws','done', '利用者との QA 票・要件・制約',                'cm-g'],
  ['            ├── ',    'parameter-sheet.xlsx',      'c-xl',  'aws','done', 'パラメーターシート（案件ごとに検討）',         'cm-g'],
  ['            └── ',    'インフラ基本設計書.xlsx',    'c-xl',  'aws','done', '設計書フォーマット・パラメーター値の元データ','cm-g'],
];

const tree = document.getElementById('tree');

rows.forEach(([prefix, name, nc, scope, status, comment, cc]) => {
  const row = document.createElement('div');
  row.className = 'row';

  const pre = document.createElement('span');
  pre.className = 'prefix';
  pre.textContent = prefix;
  row.appendChild(pre);

  const nm = document.createElement('span');
  nm.className = `name ${nc}`;
  nm.textContent = name;

  if (scope) {
    const s = document.createElement('span');
    s.className = `sc sc-${scope}`;
    s.textContent = scope === 'csp' ? 'CSP共通' : '検証フェーズ（AWS）';
    nm.appendChild(s);
  }
  if (status) {
    const s = document.createElement('span');
    s.className = `st st-${status}`;
    s.textContent = status.toUpperCase();
    nm.appendChild(s);
  }
  row.appendChild(nm);

  if (comment) {
    const dots = document.createElement('div');
    dots.className = 'dots';
    const cm = document.createElement('span');
    cm.className = `cm ${cc}`;
    cm.textContent = '# ' + comment;
    row.appendChild(dots);
    row.appendChild(cm);
  }

  tree.appendChild(row);
});
</script>
</body>
</html>
